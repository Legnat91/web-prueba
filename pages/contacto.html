<head>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen">

    <header class="bg-white shadow-sm w-full">
        <div id="cabecera" class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <span class="flex gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="icon icon-tabler icons-tabler-outline icon-tabler-mail-opened">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M3 9l9 6l9 -6l-9 -6l-9 6" />
                    <path d="M21 9v10a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-10" />
                    <path d="M3 19l6 -6" />
                    <path d="M15 13l6 6" />
                </svg>
                <h1 class="text-lime-700 font-bold"><a href="../index.html">Escapada de Ensueño</a></h1>
            </span>
            <!-- MENU MOVIL -->
            <!-- HAMBURGUESA -->
            <span class="md:hidden" id="menu-btn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-menu-2">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M4 6l16 0" />
                    <path d="M4 12l16 0" />
                    <path d="M4 18l16 0" />
                </svg></span>
            <!-- MENU MOVIL -->
            <nav id="mobile-menu"
                class=" fixed top-0 right-0 transform translate-x-full transition-transform duration-500  bg-white/90 shadow-lg h-screen flex flex-col gap-8 w-64 px-6 py-4 text-lime-500 md:hidden ">
                <svg id="btn-close" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="icon icon-tabler icons-tabler-outline icon-tabler-x">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M18 6l-12 12" />
                    <path d="M6 6l12 12" />
                </svg>
                <div class="flex flex-col">
                    <a href="./apartamentos.html" class="hover:text-lime-900 font-semibold">Alojamientos</a>
                    <a href="./experiencias.html" class="hover:text-lime-900 font-semibold">Experiencias</a>
                    <a href="./servicios.html" class="hover:text-lime-900 font-semibold">Servicios</a>
                    <a href="./contacto.html" class="hover:text-lime-900 font-semibold">Contacto</a>
                </div>
            </nav>
            <nav class="hidden md:flex gap-6 text-lime-500">
                <a href="./apartamentos.html" class="hover:text-lime-900 font-semibold">Alojamientos</a>
                <a href="./experiencias.html" class="hover:text-lime-900 font-semibold">Experiencias</a>
                <a href="./servicios.html" class="hover:text-lime-900 font-semibold">Servicios</a>
                <a href="./contacto.html" class="hover:text-lime-900 font-semibold">Contacto</a>
            </nav>
        </div>
    </header>

    <main class="flex flex-col items-center flex-1 w-full max-w-7xl mx-auto px-6 mt-10">
        <h1 class="text-center mb-10 font-bold text-4xl text-lime-600">CONTACTO</h1>
        <section class="w-full xl:flex">
          
            <form action="#" method="post"
                class="bg-green-100 w-full max-w-2xl p-8 rounded-lg flex flex-col items-center gap-4">
                <div class="w-full flex flex-col">
                    <label for="nombre" class="font-semibold text-lime-800">Nombre</label>
                    <input type="text" name="nombre" id="nombre" class="border p-2 rounded bg-white">
                </div>

                <div class="w-full flex flex-col">
                    <label for="email" class="font-semibold text-lime-800">Correo de contacto</label>
                    <input type="email" name="email" id="email" class="border p-2 rounded bg-white">
                </div>

                <div class="w-full flex flex-col">
                    <label for="trabajo" class="font-semibold text-lime-800">Me pongo en contacto por</label>
                    <select name="trabajo" id="trabajo" class="border p-2 rounded bg-white">
                        <option value="" selected disabled>==Elije una opcion==</option>
                        <optgroup label="Apartamento">
                            <option value="olivo">El Olivo</option>
                            <option value="moon">The Moon</option>
                            <option value="rincon-del-valle">Rincon del Valle</option>
                            <option value="casa-laura">Casa Laura</option>
                            <option value="hearth">Hearth</option>
                            <option value="la-choza">La choza</option>
                            <option value="valle-encanto">Valle Encnato</option>
                            <option value="pool-house">Pool House</option>
                        </optgroup>
                        <optgroup label="Experiencias">
                            <option value="termas">Circuito de Baños Termales</option>
                            <option value="masaje">Masaje Sensorial en la Dehesa</option>
                            <option value="cielos">Cielos de Extremadura</option>
                            <option value="comida">Cata de Aceites y Quesos</option>
                            <option value="4x4">Ruta 4x4 Garganta de los Infiernos</option>
                            <option value="caballo">Paseo a Caballo por la Oliva</option>
                            <option value="cesta">Cesta de Desayuno Artesano</option>
                            <option value="plasencia">Guía Privado en Plasencia</option>
                        </optgroup>
                        <optgroup label="Servicios">
                            <option value="bicicletas">Alquiler de Bicicletas</option>
                            <option value="coche">Alquiler de Coche</option>
                            <option value="mascotas">Guardería de Mascotas</option>
                            <option value="conexion">Internet y Móvil</option>
                            <option value="entrenador">Entrenador Personal</option>
                            <option value="chef">Chef a Domicilio</option>
                            <option value="peluqueria">Peluquería a Domicilio</option>
                            <option value="vuelos">Gestión de Vuelos</option>
                        </optgroup>
                    </select>
                </div>

                <div class="w-full flex flex-col">
                    <label for="mensaje" class="font-semibold text-lime-800">Mensaje</label>
                    <textarea name="mensaje" id="mensaje" rows="4" class="border p-2 rounded bg-white"></textarea>
                </div>

                <button type="submit"
                    class="bg-lime-600 text-white px-6 py-2 rounded font-bold hover:bg-lime-700 transition shadow-md mt-4">
                    Enviar Mensaje
                </button>
            </form>

            <iframe class="md:ml-3 w-full my-3"
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1816.5305116383188!2d-6.091086446159265!3d40.030154483549445!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd3e17a77067b0d1%3A0x89417864748e396b!2sGu%C3%ADas%20Oficiales%20de%20Turismo%20de%20la%20Junta%20de%20Extremadura%20-%20Visitas%20guiadas%20Plasencia!5e0!3m2!1ses!2ses!4v1772644339003!5m2!1ses!2ses"
                width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>
    </main>

    <footer class="w-full bg-green-100 py-6">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-lime-600">
            <span> &copy; 2026 Alojamiento en Sueño </span>
            <div class="flex gap-6">
                <a href="#" class="hover:text-lime-900 font-semibold">Privacidad</a>
                <a href="#" class="hover:text-lime-900 font-semibold">Condiciones</a>
                <a href="#" class="hover:text-lime-900 font-semibold">Datos de la Empresa</a>
            </div>
        </div>
    </footer>
    <script src="../app/app.js"></script>

</body>

</html>
